<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{% block title %}Stack Coin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% block css %}
    {% endblock %}
  </head>
  <body>    
    <div class="container my-4">
      <div class="row justify-content-center">
        <div class="col-lg-3 col-md-4 col-sm-8 col-12">
          <a href="{% url 'home' %}">home</a> | <a href="{% url 'transactions' %}">txn</a>
          <h3 class="text-muted">Hi {{request.user.first_name}}.</h3>
          <p class="lead">Your balance: {{request.user.balance}}$</p>
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          {% endfor %}
          {% block content %}
          {% endblock %}
        </div>
      </div>        
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>    
    {% block js %}
    {% endblock %}
  </body>
</html>
